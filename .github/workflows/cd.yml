name: Deploy to Docker Swarm

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitLab Registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/compose/backend/prod/Dockerfile
          push: true
          tags: |
            ${{ secrets.IMAGE_REGISTRY }}:${{ github.sha }}
            ${{ secrets.IMAGE_REGISTRY }}:latest
          cache-from: type=registry,ref=${{ secrets.IMAGE_REGISTRY }}:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Stack to Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Pulling latest changes..."
            git fetch --all
            git reset --hard origin/main

            # Set deployment variables
            export IMAGE_REGISTRY=${{ secrets.IMAGE_REGISTRY }}
            export IMAGE_TAG=${{ github.sha }}
            export DOMAIN=${{ secrets.DOMAIN }}
            export ACME_EMAIL=${{ secrets.ACME_EMAIL }}
            export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            export POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            export S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}

            # Run migrations (one-shot)
            echo "Running migrations..."
            docker service scale cargo_migrate=1 || true
            sleep 30
            docker service scale cargo_migrate=0 || true

            # Deploy the stack
            echo "Deploying stack..."
            docker stack deploy \
              --compose-file docker-compose.swarm.yml \
              --with-registry-auth \
              --prune \
              cargo

            # Verify deployment
            docker stack services cargo

            # Cleanup unused images
            docker image prune -af

            echo "Deployment completed successfully!"
