# =============================================================================
# Docker Swarm Stack for cargo_backend
# Deploy: docker stack deploy -c docker-compose.swarm.yml --with-registry-auth cargo
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # TRAEFIK — Reverse proxy & load balancer with Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=true"
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entrypoints.metrics.address=:8082"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - cargo_overlay
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ---------------------------------------------------------------------------
  # WEB — Django (gunicorn + uvicorn workers)
  # ---------------------------------------------------------------------------
  web:
    image: ${IMAGE_REGISTRY:-registry.gitlab.com/your-group/cargo_backend}:${IMAGE_TAG:-latest}
    command: /start
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_BOUNCER_HOST=pgbouncer
      - POSTGRES_BOUNCER_PORT=6432
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-cargo-media}
      - S3_REGION_NAME=us-east-1
      - SENTRY_ENVIRONMENT=production
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      - EXTRA_ALLOWED_HOSTS=${DOMAIN}
      - EXTRA_CSRF_ORIGINS=https://${DOMAIN}
      - EXTRA_CORS_ORIGINS=https://${DOMAIN}
    secrets:
      - django_secret_key
      - postgres_password
      - s3_access_key
      - s3_secret_key
      - sentry_dsn
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cargo_overlay
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 30s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.web.entrypoints=websecure"
        - "traefik.http.routers.web.tls.certresolver=letsencrypt"
        - "traefik.http.services.web.loadbalancer.server.port=8000"
        - "traefik.http.services.web.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.web.loadbalancer.sticky.cookie.name=cargo_sticky"
        - "traefik.http.services.web.loadbalancer.healthcheck.path=/api/health/"
        - "traefik.http.services.web.loadbalancer.healthcheck.interval=10s"

  # ---------------------------------------------------------------------------
  # REDIS
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - cargo_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ---------------------------------------------------------------------------
  # PGBOUNCER — Connection pooling (single instance ONLY)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 100
      MAX_CLIENT_CONN: 10000
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      SERVER_TLS_SSLMODE: prefer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cargo_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ---------------------------------------------------------------------------
  # CELERY WORKER (scalable)
  # ---------------------------------------------------------------------------
  celery_worker:
    image: ${IMAGE_REGISTRY:-registry.gitlab.com/your-group/cargo_backend}:${IMAGE_TAG:-latest}
    command: /start-celeryworker
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_BOUNCER_HOST=pgbouncer
      - POSTGRES_BOUNCER_PORT=6432
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-cargo-media}
      - SENTRY_ENVIRONMENT=production
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.2}
    secrets:
      - django_secret_key
      - postgres_password
      - s3_access_key
      - s3_secret_key
      - sentry_dsn
    networks:
      - cargo_overlay
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------------------------------
  # CELERY BEAT — Scheduler (exactly ONE instance, never more)
  # ---------------------------------------------------------------------------
  celery_beat:
    image: ${IMAGE_REGISTRY:-registry.gitlab.com/your-group/cargo_backend}:${IMAGE_TAG:-latest}
    command: /start-celerybeat
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_BOUNCER_HOST=pgbouncer
      - POSTGRES_BOUNCER_PORT=6432
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - SENTRY_ENVIRONMENT=production
    secrets:
      - django_secret_key
      - postgres_password
      - sentry_dsn
    networks:
      - cargo_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------------------------------
  # MINIO — S3-compatible object storage (pinned to storage node)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/s3_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/s3_secret_key
    secrets:
      - s3_access_key
      - s3_secret_key
    volumes:
      - /mnt/havola-drive-1/www/cargo:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cargo_overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.storage == minio
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
        - "traefik.http.routers.minio-api.entrypoints=websecure"
        - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
        - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
        - "traefik.http.routers.minio-console.entrypoints=websecure"
        - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
        - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # ---------------------------------------------------------------------------
  # MINIO-INIT — One-shot bucket creation
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 $$(cat /run/secrets/s3_access_key) $$(cat /run/secrets/s3_secret_key);
      mc mb --ignore-existing local/$${S3_BUCKET_NAME:-cargo-media};
      mc anonymous set download local/$${S3_BUCKET_NAME:-cargo-media};
      exit 0;
      "
    environment:
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-cargo-media}
    secrets:
      - s3_access_key
      - s3_secret_key
    networks:
      - cargo_overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3

  # ---------------------------------------------------------------------------
  # MIGRATE — One-shot Django migrations (scale to 1 when needed)
  # ---------------------------------------------------------------------------
  migrate:
    image: ${IMAGE_REGISTRY:-registry.gitlab.com/your-group/cargo_backend}:${IMAGE_TAG:-latest}
    command: /migrate
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - POSTGRES_BOUNCER_HOST=pgbouncer
      - POSTGRES_BOUNCER_PORT=6432
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER=redis://redis:6379/0
      - DEBUG=False
    secrets:
      - django_secret_key
      - postgres_password
    networks:
      - cargo_overlay
    deploy:
      replicas: 0
      restart_policy:
        condition: none

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  cargo_overlay:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    driver: local
  traefik_letsencrypt:
    driver: local

# =============================================================================
# SECRETS (create with: echo "value" | docker secret create <name> -)
# =============================================================================
secrets:
  django_secret_key:
    external: true
  postgres_password:
    external: true
  s3_access_key:
    external: true
  s3_secret_key:
    external: true
  sentry_dsn:
    external: true
