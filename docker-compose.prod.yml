name: cargo-prod

services:
  web:
    build:
      context: .
      dockerfile: deployments/compose/backend/prod/Dockerfile
    command: /start
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: always
    volumes:
      - ./src:/app
      - ./assets:/assets
    ports:
      - ${PORT:-8001}:8000
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_cargo_network


  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod_cargo_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 100
      MAX_CLIENT_CONN: 10000
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      SERVER_TLS_SSLMODE: prefer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod_cargo_network

  celery_worker:
    build:
      context: .
      dockerfile: deployments/compose/backend/prod/Dockerfile
    command: /start-celeryworker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: always
    volumes:
      - ./src:/app
      - ./assets:/assets
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_cargo_network

  celery_beat:
    build:
      context: .
      dockerfile: deployments/compose/backend/prod/Dockerfile
    command: /start-celerybeat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: always
    volumes:
      - ./src:/app
      - ./assets:/assets
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_cargo_network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - /mnt/havola-drive-1/www/cargo:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - prod_cargo_network

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET_NAME:-cargo-media};
      mc anonymous set download local/$${S3_BUCKET_NAME:-cargo-media};
      cat > /tmp/cors.json << 'CORS_EOF'
      {
        \"CORSRules\": [
          {
            \"AllowedOrigins\": [\"*\"],
            \"AllowedMethods\": [\"GET\", \"PUT\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\"]
          }
        ]
      }
      CORS_EOF
      mc cors set local/$${S3_BUCKET_NAME:-cargo-media} < /tmp/cors.json;
      exit 0;
      "
    env_file:
      - .env
    networks:
      - prod_cargo_network


volumes:
  pg_data:
    driver: local

networks:
  prod_cargo_network:
    driver: bridge
